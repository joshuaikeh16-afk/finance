<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Finance Tracker • Smart Analytics</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    /* 1. DYNAMIC COLOR VARIABLES */
    :root { 
      --bg-body: #f0f2f5;
      --bg-panel: #ffffff;
      --text-main: #1a1a1a;
      --text-muted: #888888;
      --border-color: #f0f0f0;
      --input-bg: #f8fafc;
      
      --primary: #4361ee; 
      --primary-light: #4895ef; 
      --success: #06d6a0; 
      --danger: #ef476f; 
      --warning: #ffd166; 
      --sidebar-grad: linear-gradient(180deg, #4361ee 0%, #3a0ca3 100%);
    }

    /* 2. DARK MODE OVERRIDES */
    body.dark-mode {
      --bg-body: #0f172a;
      --bg-panel: #1e293b;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --border-color: #334155;
      --input-bg: #0f172a;
      --sidebar-grad: linear-gradient(180deg, #1e293b 0%, #0f172a 100%);
    }

    * { margin:0; padding:0; box-sizing:border-box; transition: background 0.3s ease, color 0.3s ease; }
    body { font-family: 'Segoe UI', sans-serif; background: var(--bg-body); color: var(--text-main); display: flex; min-height: 100vh; }

    /* Sidebar */
    .sidebar { width: 260px; background: var(--sidebar-grad); color: white; height: 100vh; position: sticky; top: 0; padding-top: 2rem; box-shadow: 4px 0 15px rgba(0,0,0,0.1); z-index: 100; }
    .logo { padding: 0 2rem 2.5rem; font-size: 1.8rem; font-weight: 800; display: flex; align-items: center; gap: 10px; }
    .nav-item a { display: flex; align-items: center; padding: 1rem 1.5rem; color: rgba(255,255,255,0.7); text-decoration: none; font-weight: 500; }
    .nav-item a.active { background: white; color: var(--primary); border-radius: 0 50px 50px 0; margin-right: 1rem; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    .nav-item i { width: 30px; font-size: 1.1rem; }

    .main-content { flex: 1; padding: 2.5rem 3.5rem; overflow-y: auto; }
    
    header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2.5rem; }
    header h1 { font-size: 1.8rem; font-weight: 800; color: var(--text-main); }
    
    .user-badge { 
      width: 45px; height: 45px; background: var(--bg-panel); border-radius: 15px; 
      display: flex; align-items: center; justify-content: center; 
      font-weight: 800; color: var(--primary); box-shadow: 0 4px 10px rgba(0,0,0,0.05); 
    }

    /* Cards & Metrics */
    .metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1.5rem; margin-bottom: 2.5rem; }
    .card { background: var(--bg-panel); border-radius: 24px; padding: 1.8rem; box-shadow: 0 10px 25px rgba(0,0,0,0.03); border: 1px solid var(--border-color); }
    
    .metric-label { font-size: 0.75rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
    .metric-value { font-size: 2.2rem; font-weight: 800; margin-top: 0.5rem; }

    /* Visualizer */
    .viz-container { display: grid; grid-template-columns: 1.8fr 1.2fr; gap: 2rem; margin-bottom: 2.5rem; }
    .chart-header h3 { font-weight: 800; font-size: 1.1rem; color: var(--text-main); }

    /* Bar Chart Custom Colors */
    .bar-wrapper { display: flex; align-items: flex-end; justify-content: space-between; height: 220px; padding: 10px 0; border-bottom: 2px solid var(--border-color); }
    .bar { width: 35px; background: var(--primary-light); border-radius: 8px 8px 4px 4px; position: relative; cursor: pointer; opacity: 0.8; }
    .bar:hover { background: var(--primary); opacity: 1; transform: scaleX(1.1); }
    .bar-val { font-size: 0.65rem; font-weight: 700; color: var(--primary); margin-bottom: 5px; opacity: 0; }
    .bar-label { font-size: 0.7rem; font-weight: 600; color: var(--text-muted); }

    /* Progress UI */
    .progress-bg { height: 8px; background: var(--bg-body); border-radius: 10px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--primary); border-radius: 10px; }

    /* Breakdown List */
    .breakdown-item { display: flex; justify-content: space-between; align-items: center; padding: 1.2rem; background: var(--bg-panel); border-radius: 16px; margin-bottom: 0.8rem; border: 1px solid var(--border-color); }
    .tag { font-size: 0.7rem; padding: 4px 10px; border-radius: 6px; font-weight: 800; text-transform: uppercase; background: var(--bg-body); color: var(--text-muted); }
  </style>
</head>
<body>

  <script>
    (function initTheme() {
      if (localStorage.getItem('theme') === 'dark') {
        document.body.classList.add('dark-mode');
      }
    })();
  </script>

  <aside class="sidebar">
    <div class="logo"><i class="fas fa-bolt-lightning"></i> Finance</div>
    <ul class="nav-list">
      <li class="nav-item"><a href="main.html"><i class="fas fa-grid-2"></i><span>Dashboard</span></a></li>
      <li class="nav-item"><a href="account.html"><i class="fas fa-wallet"></i><span>Accounts</span></a></li>
      <li class="nav-item"><a href="analytic.html" class="active"><i class="fas fa-chart-line"></i><span>Analytics</span></a></li>
      <li class="nav-item"><a href="trans.html"><i class="fas fa-exchange-alt"></i><span>Transactions</span></a></li>
      <li class="nav-item"><a href="category.html"><i class="fas fa-layer-group"></i><span>Categories</span></a></li>
      <li class="nav-item"><a href="setting.html"><i class="fas fa-sliders-h"></i><span>Settings</span></a></li>
    </ul>
  </aside>

  <main class="main-content">
    <header>
      <h1>Intelligence & Insights</h1>
      <div class="user-badge" id="uInit">??</div>
    </header>

    <div class="metrics-grid">
      <div class="card">
        <div class="metric-label">Income Inflow</div>
        <div class="metric-value" id="totalInc" style="color:var(--success)">₦ 0</div>
      </div>
      <div class="card">
        <div class="metric-label">Expense Outflow</div>
        <div class="metric-value" id="totalExp" style="color:var(--danger)">₦ 0</div>
      </div>
      <div class="card">
        <div class="metric-label">Efficiency Rate</div>
        <div class="metric-value" id="saveRate">0%</div>
      </div>
    </div>

    <div class="viz-container">
      <div class="card">
        <div class="chart-header">
          <h3>Spending Trend</h3>
          <span style="font-size: 0.7rem; color: var(--text-muted); font-weight: 700;">LAST 7 LOGGED DAYS</span>
        </div>
        <div class="bar-wrapper" id="barChart"></div>
      </div>

      <div class="card">
        <div class="chart-header">
          <h3>Top Categories</h3>
        </div>
        <div id="catSummary"></div>
      </div>
    </div>

    <h3 style="margin-bottom:1.5rem; font-weight:800;">Detailed Breakdown</h3>
    <div class="breakdown-list" id="fullCatList"></div>
  </main>

  <script>
    function loadAnalytics() {
      const txns = JSON.parse(localStorage.getItem('myTransactions')) || [];
      
      // SYNC NAME & INITIALS
      const user = localStorage.getItem('userName') || 'Guest User';
      const initials = user.split(' ').map(n => n[0]).join('').toUpperCase().substring(0, 2);
      document.getElementById('uInit').innerText = initials;

      let inc = 0, exp = 0;
      const catTotals = {};
      const dailyData = {};

      txns.forEach(t => {
        const amt = Math.abs(t.amt);
        if(t.type === 'income') {
          inc += amt;
        } else {
          exp += amt;
          catTotals[t.cat] = (catTotals[t.cat] || 0) + amt;
          dailyData[t.date] = (dailyData[t.date] || 0) + amt;
        }
      });

      const fmt = (v) => new Intl.NumberFormat('en-NG', { 
        style: 'currency', 
        currency: 'NGN',
        maximumFractionDigits: 0 
      }).format(v);

      document.getElementById('totalInc').innerText = fmt(inc);
      document.getElementById('totalExp').innerText = fmt(exp);
      const rate = inc > 0 ? Math.round(((inc - exp) / inc) * 100) : 0;
      document.getElementById('saveRate').innerText = (rate < 0 ? 0 : rate) + "%";

      // Build Bar Chart
      const barChart = document.getElementById('barChart');
      barChart.innerHTML = '';
      const days = Object.keys(dailyData).sort().slice(-7);
      const maxExp = Math.max(...Object.values(dailyData), 1);

      days.forEach(d => {
        const height = (dailyData[d] / maxExp) * 100;
        // Format date better for chart
        barChart.innerHTML += `
          <div class="bar-group" style="flex:1; display:flex; flex-direction:column; align-items:center; height:100%; justify-content:flex-end;">
            <span class="bar-val">₦${Math.round(dailyData[d]/1000)}k</span>
            <div class="bar" style="height: ${height}%"></div>
            <span class="bar-label" style="margin-top:8px;">${d}</span>
          </div>`;
      });

      // Build Categories
      const catList = document.getElementById('fullCatList');
      const catSum = document.getElementById('catSummary');
      catList.innerHTML = ''; catSum.innerHTML = '';

      const sortedCats = Object.keys(catTotals).sort((a,b) => catTotals[b] - catTotals[a]);

      sortedCats.forEach((c, i) => {
        const percent = exp > 0 ? Math.round((catTotals[c] / exp) * 100) : 0;
        
        if(i < 4) {
          catSum.innerHTML += `
            <div class="cat-row" style="margin-bottom:1.2rem;">
              <div class="cat-info" style="display:flex; justify-content:space-between; font-size:0.85rem; font-weight:700; margin-bottom:6px;">
                <span>${c}</span><span>${percent}%</span>
              </div>
              <div class="progress-bg"><div class="progress-fill" style="width:${percent}%"></div></div>
            </div>`;
        }

        catList.innerHTML += `
          <div class="breakdown-item">
            <div style="display:flex; align-items:center; gap:15px;">
                <span class="tag">${c}</span>
                <span style="font-weight:700;">${c} Operations</span>
            </div>
            <div style="text-align:right">
                <div style="font-weight:800; color:var(--danger)">- ${fmt(catTotals[c])}</div>
                <div style="font-size:0.7rem; color:var(--text-muted); font-weight:700;">${percent}% OF TOTAL SPEND</div>
            </div>
          </div>`;
      });

      if(txns.length === 0) {
        catList.innerHTML = `<div style="text-align:center; padding:5rem; color:var(--text-muted); background:var(--bg-panel); border-radius:24px; border:1px solid var(--border-color);">
            <i class="fas fa-chart-area" style="font-size:3rem; opacity:0.2; margin-bottom:1rem;"></i>
            <p>Insufficient data to generate intelligence reports.</p>
        </div>`;
      }
    }

    window.onload = loadAnalytics;
  </script>
</body>
</html>
