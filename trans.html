<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Finance Tracker • Transactions</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    /* 1. DYNAMIC COLOR VARIABLES */
    :root {
      --bg-body: #f8fafc;
      --bg-panel: #ffffff;
      --text-main: #0f172a;
      --text-muted: #94a3b8;
      --border-color: #f1f5f9;
      --input-bg: #f8fafc;
      
      --primary: #4361ee;
      --primary-hover: #3a0ca3;
      --success: #06d6a0;
      --danger: #ef476f;
      --gray: #94a3b8;
      --sidebar-grad: linear-gradient(180deg, #4361ee 0%, #3a0ca3 100%);
    }

    /* 2. DARK MODE OVERRIDES */
    body.dark-mode {
      --bg-body: #0f172a;
      --bg-panel: #1e293b;
      --text-main: #f8fafc;
      --text-muted: #64748b;
      --border-color: #334155;
      --input-bg: #1e293b;
      --sidebar-grad: linear-gradient(180deg, #1e293b 0%, #0f172a 100%);
    }

    * { margin:0; padding:0; box-sizing:border-box; transition: background 0.3s ease, color 0.3s ease; }
    body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg-body); color: var(--text-main); min-height: 100vh; display: flex; }

    .sidebar { width: 260px; background: var(--sidebar-grad); color: white; height: 100vh; position: sticky; top: 0; padding-top: 2rem; box-shadow: 4px 0 15px rgba(0,0,0,0.1); }
    .logo { padding: 0 2rem 2.5rem; font-size: 1.8rem; font-weight: 800; display: flex; align-items: center; gap: 10px; }
    .nav-item a { display: flex; align-items: center; padding: 1rem 1.5rem; color: rgba(255,255,255,0.7); text-decoration: none; font-weight: 500; }
    .nav-item a.active { background: white; color: var(--primary); border-radius: 0 50px 50px 0; margin-right: 1rem; box-shadow: 0 10px 15px rgba(0,0,0,0.1); }
    .nav-item i { width: 30px; font-size: 1.1rem; }

    .content-wrapper { flex: 1; display: flex; flex-direction: column; }
    .header { background: var(--bg-panel); backdrop-filter: blur(10px); padding: 1.5rem 3rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); position: sticky; top: 0; z-index: 50; }
    .header h1 { font-size: 1.6rem; font-weight: 800; }

    .main-content { padding: 2.5rem 3.5rem; }

    .search-input { width: 100%; padding: 12px 15px 12px 45px; border: 1px solid var(--border-color); border-radius: 16px; background: var(--bg-panel); color: var(--text-main); font-size: 0.95rem; }
    .search-container i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
    
    .currency-pill { background: var(--bg-body); color: var(--text-main); border: 1px solid var(--border-color); padding: 8px 16px; border-radius: 12px; font-weight: 700; cursor: pointer; }

    .table-card { background: var(--bg-panel); border-radius: 24px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.04); border: 1px solid var(--border-color); }
    table { width: 100%; border-collapse: collapse; }
    th { padding: 1.2rem 1.5rem; text-align: left; color: var(--text-muted); font-size: 0.75rem; font-weight: 700; text-transform: uppercase; border-bottom: 1px solid var(--border-color); }
    td { padding: 1.2rem 1.5rem; border-bottom: 1px solid var(--border-color); vertical-align: middle; color: var(--text-main); }
    tr:hover td { background: rgba(67, 97, 238, 0.05); }

    .cat-tag { padding: 6px 12px; border-radius: 10px; font-size: 0.75rem; font-weight: 800; background: var(--bg-body); color: var(--text-muted); text-transform: uppercase; }
    
    /* Modal Theme */
    .modal { background: var(--bg-panel); padding: 2.5rem; border-radius: 30px; color: var(--text-main); border: 1px solid var(--border-color); }
    .form-group label { display: block; margin-bottom: 8px; font-size: 0.85rem; font-weight: 600; color: var(--text-muted); }
    .form-group input, .form-group select { background: var(--bg-body); color: var(--text-main); border: 1.5px solid var(--border-color); }
    
    .add-btn { background: var(--primary); color: white; border: none; padding: 12px 24px; border-radius: 16px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 8px; }
  </style>
</head>
<body>

  <script>
    (function initTheme() {
      if (localStorage.getItem('theme') === 'dark') {
        document.body.classList.add('dark-mode');
      }
    })();
  </script>

  <aside class="sidebar">
    <div class="logo"><i class="fas fa-bolt-lightning"></i> Finance</div>
    <ul class="nav-list">
      <li class="nav-item"><a href="main.html"><i class="fas fa-grid-2"></i><span>Dashboard</span></a></li>
      <li class="nav-item"><a href="account.html"><i class="fas fa-wallet"></i><span>Accounts</span></a></li>
      <li class="nav-item"><a href="analytic.html"><i class="fas fa-chart-line"></i><span>Analytics</span></a></li>
      <li class="nav-item"><a href="trans.html" class="active"><i class="fas fa-exchange-alt"></i><span>Transactions</span></a></li>
      <li class="nav-item"><a href="category.html"><i class="fas fa-layer-group"></i><span>Categories</span></a></li>
      <li class="nav-item"><a href="setting.html"><i class="fas fa-sliders-h"></i><span>Settings</span></a></li>
    </ul>
  </aside>

  <div class="content-wrapper">
    <header class="header">
      <h1>Ledger</h1>
      <div style="display: flex; align-items: center; gap: 15px;">
        <select id="currencySelector" class="currency-pill" onchange="updateUI()">
          <option value="NGN">₦ NGN</option>
          <option value="USD">$ USD</option>
          <option value="EUR">€ EUR</option>
        </select>
        <div id="userInitials" style="width:40px; height:40px; background:var(--primary); color:white; border-radius:12px; display:flex; align-items:center; justify-content:center; font-weight:bold; box-shadow: 0 4px 10px rgba(67, 97, 238, 0.3);">IK</div>
      </div>
    </header>

    <main class="main-content">
      <div class="controls-row" style="display:flex; justify-content:space-between; margin-bottom:2rem;">
        <div class="search-container" style="position:relative; flex:1; max-width:400px;">
          <i class="fas fa-search"></i>
          <input type="text" id="searchInput" class="search-input" placeholder="Search transactions..." oninput="updateUI()">
        </div>
        <button class="add-btn" onclick="openModal()">
          <i class="fas fa-plus"></i> New Entry
        </button>
      </div>

      <div class="table-card">
        <table>
          <thead>
            <tr>
              <th>Date</th>
              <th>Description</th>
              <th>Category</th>
              <th style="text-align: right;">Amount</th>
            </tr>
          </thead>
          <tbody id="txnBody"></tbody>
        </table>
      </div>
    </main>
  </div>

  <div class="modal-overlay" id="modalOverlay" style="position:fixed; inset:0; background:rgba(0,0,0,0.5); display:none; justify-content:center; align-items:center; z-index:1000;">
    <div class="modal" style="width:450px;">
      <h3>✨ Add Transaction</h3>
      <div style="margin-top:20px;">
        <div class="form-group" style="margin-bottom:15px;">
          <label>Description</label>
          <input type="text" id="newDesc" style="width:100%; padding:10px; border-radius:8px;">
        </div>
        <div style="display:flex; gap:10px; margin-bottom:15px;">
            <div class="form-group" style="flex:1;">
                <label>Amount</label>
                <input type="number" id="newAmt" style="width:100%; padding:10px; border-radius:8px;">
            </div>
            <div class="form-group" style="flex:1;">
                <label>Type</label>
                <select id="newType" onchange="handleTypeChange()" style="width:100%; padding:10px; border-radius:8px;">
                    <option value="expense">Expense</option>
                    <option value="income">Income</option>
                </select>
            </div>
        </div>
        <div id="catWrapper" class="form-group" style="margin-bottom:20px;">
            <label>Category</label>
            <select id="newCat" style="width:100%; padding:10px; border-radius:8px;">
                <option value="Food">🍔 Food</option>
                <option value="Transport">🚗 Transport</option>
                <option value="Shopping">🛍️ Shopping</option>
                <option value="Salary">💰 Salary</option>
                <option value="Misc">📦 Misc</option>
            </select>
        </div>
        <div style="display:flex; gap:10px;">
            <button onclick="closeModal()" style="flex:1; padding:12px; border-radius:10px; border:none; background:var(--bg-body); color:var(--text-muted); cursor:pointer;">Cancel</button>
            <button onclick="saveTxn()" style="flex:2; padding:12px; border-radius:10px; border:none; background:var(--primary); color:white; cursor:pointer; font-weight:700;">Save</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    let txns = JSON.parse(localStorage.getItem('myTransactions')) || [];
    const rates = { NGN: 1, USD: 0.00065, EUR: 0.00060 };

    window.onload = function() {
      const savedName = localStorage.getItem('userName') || "Guest User";
      const initials = savedName.split(' ').map(n => n[0]).join('').toUpperCase().substring(0, 2);
      document.getElementById('userInitials').innerText = initials;
      
      if (Notification.permission !== "granted") Notification.requestPermission();
      updateUI();
    };

    // New function to toggle Category visibility
    function handleTypeChange() {
      const type = document.getElementById('newType').value;
      const catWrapper = document.getElementById('catWrapper');
      catWrapper.style.display = (type === 'income') ? 'none' : 'block';
    }

    function updateUI() {
      const curr = document.getElementById('currencySelector').value;
      const search = (document.getElementById('searchInput').value || "").toLowerCase();
      const tbody = document.getElementById('txnBody');
      tbody.innerHTML = '';
      
      txns.filter(t => t.desc.toLowerCase().includes(search) || t.cat.toLowerCase().includes(search)).forEach(t => {
        const converted = t.amt * rates[curr];
        const formatted = new Intl.NumberFormat('en-US', { style: 'currency', currency: curr }).format(Math.abs(converted));
        tbody.innerHTML += `<tr>
            <td><span style="font-size:0.8rem; color:var(--text-muted);">${t.date}</span></td>
            <td><strong>${t.desc}</strong></td>
            <td><span class="cat-tag">${t.cat}</span></td>
            <td style="text-align: right;"><span class="amount ${t.type}" style="color:var(--${t.type === 'income' ? 'success':'danger'})">${t.type === 'income' ? '+' : '-'}${formatted}</span></td>
        </tr>`;
      });
    }

    function openModal() { document.getElementById('modalOverlay').style.display = 'flex'; }
    function closeModal() { 
      document.getElementById('modalOverlay').style.display = 'none'; 
      // Reset to default expense view on close
      document.getElementById('newType').value = 'expense';
      handleTypeChange();
    }

    function saveTxn() {
      const desc = document.getElementById('newDesc').value;
      const inputAmt = parseFloat(document.getElementById('newAmt').value);
      const type = document.getElementById('newType').value;
      const curr = document.getElementById('currencySelector').value;
      
      // Auto-assign "Income" category if it's an income type
      const cat = (type === 'income') ? 'Income' : document.getElementById('newCat').value;

      if(!desc || isNaN(inputAmt)) return alert("Invalid entry");

      const baseAmt = inputAmt / rates[curr];
      txns.unshift({
        date: new Date().toLocaleDateString('en-GB', { day: '2-digit', month: 'short' }),
        desc: desc, cat: cat, amt: baseAmt, type: type
      });

      localStorage.setItem('myTransactions', JSON.stringify(txns));
      
      const newTotal = txns.reduce((sum, t) => sum + (t.type === 'income' ? t.amt : -t.amt), 0);
      checkNotificationLogic(newTotal, baseAmt);

      updateUI();
      closeModal();
    }

    function sendFinanceAlert(title, message) {
        if (Notification.permission === "granted") {
            new Notification(title, { body: message });
        }
    }

    function checkNotificationLogic(newTotal, addedAmount) {
        if (addedAmount >= 50000) sendFinanceAlert("💰 Large Entry!", "Check your accounts!");
        if (newTotal < 5000) sendFinanceAlert("⚠️ Low Balance", "You're under ₦5,000");
    }
  </script>
</body>
</html>
