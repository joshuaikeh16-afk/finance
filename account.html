<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Finance Tracker • Accounts</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    /* 1. DYNAMIC COLOR VARIABLES */
    :root { 
      --bg-body: #f0f2f5;
      --bg-panel: #ffffff;
      --text-main: #1a1a1a;
      --text-muted: #888888;
      --border-color: #eeeeee;
      --input-bg: #f9f9f9;

      --primary: #4361ee; 
      --success: #06d6a0; 
      --danger: #ef476f; 
      --sidebar-grad: linear-gradient(180deg, #4361ee 0%, #3a0ca3 100%); 
    }

    /* 2. DARK MODE OVERRIDES */
    body.dark-mode {
      --bg-body: #0f172a;
      --bg-panel: #1e293b;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --border-color: #334155;
      --input-bg: #0f172a;
      --sidebar-grad: linear-gradient(180deg, #1e293b 0%, #0f172a 100%);
    }
    
    * { margin:0; padding:0; box-sizing:border-box; transition: background 0.3s ease, color 0.3s ease; }
    body { font-family: 'Segoe UI', sans-serif; background: var(--bg-body); color: var(--text-main); display: flex; min-height: 100vh; }

    /* Sidebar */
    .sidebar { width: 260px; background: var(--sidebar-grad); color: white; height: 100vh; position: sticky; top: 0; padding-top: 2rem; z-index: 100; }
    .nav-item a { display: flex; align-items: center; padding: 1rem 1.5rem; color: rgba(255,255,255,0.7); text-decoration: none; font-weight: 500; }
    .nav-item a.active { background: white; color: var(--primary); border-radius: 0 50px 50px 0; margin-right: 1rem; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    .nav-item i { width: 30px; }

    /* Main UI Wrapper */
    .main-wrapper { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    header { background: var(--bg-panel); padding: 1.5rem 3rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); }
    .main-content { padding: 2.5rem 3.5rem; }

    /* Net Worth Card */
    .net-worth-card { 
      background: var(--bg-panel); border-radius: 24px; padding: 2.5rem; text-align: center; 
      box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 2.5rem;
      border: 1px solid var(--border-color);
    }
    .net-worth-card h2 { font-size: 3rem; font-weight: 800; color: var(--text-main); margin-top: 0.5rem; }

    /* Accounts Grid */
    .accounts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.5rem; }
    .account-card { 
      background: var(--bg-panel); border-radius: 20px; padding: 1.8rem; 
      box-shadow: 0 5px 15px rgba(0,0,0,0.05); position: relative;
      border-left: 6px solid var(--primary); border-top: 1px solid var(--border-color);
      border-right: 1px solid var(--border-color); border-bottom: 1px solid var(--border-color);
    }
    .account-card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
    .acc-name { font-weight: 700; color: var(--text-muted); text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px; }
    .acc-bal { font-size: 2rem; font-weight: 800; margin: 0.5rem 0; color: var(--text-main); }

    /* Modal Styling */
    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); display: none; justify-content: center; align-items: center; z-index: 1000; }
    .modal-content { background: var(--bg-panel); padding: 2.5rem; border-radius: 24px; width: 450px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); border: 1px solid var(--border-color); }
    .modal-content h3 { margin-bottom: 1.5rem; font-weight: 800; color: var(--text-main); }
    .modal-content label { color: var(--text-muted); font-weight: 600; font-size: 0.85rem; }
    .modal-content input { width: 100%; padding: 12px 15px; margin: 8px 0 15px; border: 1px solid var(--border-color); border-radius: 12px; background: var(--input-bg); color: var(--text-main); }
    
    .btn-primary { background: var(--primary); color: white; border: none; padding: 12px 25px; border-radius: 12px; font-weight: 700; cursor: pointer; }
    .btn-ghost { background: var(--bg-body); color: var(--text-muted); border: none; padding: 12px 25px; border-radius: 12px; font-weight: 700; cursor: pointer; }

    /* Profile Sync */
    #userInitials { 
      width:40px; height:40px; background:white; color:var(--primary); 
      border-radius:12px; display:flex; align-items:center; justify-content:center; 
      font-weight:bold; box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
    }
  </style>
</head>
<body>

  <script>
    (function initTheme() {
      if (localStorage.getItem('theme') === 'dark') {
        document.body.classList.add('dark-mode');
      }
    })();
  </script>

  <aside class="sidebar">
    <div style="padding: 0 2rem 2.5rem; font-size: 1.8rem; font-weight: 800;"><i class="fas fa-bolt-lightning"></i> Finance</div>
    <ul class="nav-list">
      <li class="nav-item"><a href="main.html"><i class="fas fa-grid-2"></i><span>Dashboard</span></a></li>
      <li class="nav-item"><a href="account.html" class="active"><i class="fas fa-wallet"></i><span>Accounts</span></a></li>
      <li class="nav-item"><a href="analytic.html"><i class="fas fa-chart-line"></i><span>Analytics</span></a></li>
      <li class="nav-item"><a href="trans.html"><i class="fas fa-exchange-alt"></i><span>Transactions</span></a></li>
      <li class="nav-item"><a href="category.html"><i class="fas fa-layer-group"></i><span>Categories</span></a></li>
      <li class="nav-item"><a href="setting.html"><i class="fas fa-sliders-h"></i><span>Settings</span></a></li>
    </ul>
    <div style="position:absolute; bottom:20px; left:20px; display:flex; align-items:center; gap:12px;">
      <div id="userInitials">??</div>
      <div style="font-size:0.85rem; font-weight:600; color:white; opacity:0.8;" id="sidebarName">Guest User</div>
    </div>
  </aside>

  <div class="main-wrapper">
    <header>
      <h1 style="color: var(--text-main);">My Accounts</h1>
      <button class="btn-primary" onclick="openAccModal()"><i class="fas fa-plus"></i> New Account</button>
    </header>

    <main class="main-content">
      <div class="net-worth-card">
        <p style="color:var(--text-muted); font-weight: 600;">NET WORTH OVERVIEW</p>
        <h2 id="netWorthDisplay">₦ 0.00</h2>
      </div>

      <div class="accounts-grid" id="accountsGrid"></div>
    </main>
  </div>

  <div class="modal" id="accModal">
    <div class="modal-content">
      <h3>✨ Create Account</h3>
      <label>Account Name</label>
      <input type="text" id="accName" placeholder="e.g. Opay, Zenith Bank">
      <label>Initial Deposit (₦)</label>
      <input type="number" id="accInitial" placeholder="0.00">
      <div style="display:flex; gap:10px; margin-top:10px;">
        <button onclick="saveAccount()" class="btn-primary" style="flex:2">Create Account</button>
        <button onclick="closeAccModal()" class="btn-ghost" style="flex:1">Cancel</button>
      </div>
    </div>
  </div>

  <script>
    function renderAccounts() {
      const txns = JSON.parse(localStorage.getItem('myTransactions')) || [];
      const accounts = JSON.parse(localStorage.getItem('myAccounts')) || [];
      
      // Sync User Identity in Sidebar
      const savedName = localStorage.getItem('userName') || "Guest User";
      const initials = savedName.split(' ').map(n => n[0]).join('').toUpperCase().substring(0, 2);
      document.getElementById('sidebarName').innerText = savedName;
      document.getElementById('userInitials').innerText = initials;

      // Calculate Total Net Worth
      let totalBalance = 0;
      txns.forEach(t => totalBalance += t.amt);

      document.getElementById('netWorthDisplay').innerText = 
        new Intl.NumberFormat('en-NG', { style: 'currency', currency: 'NGN' }).format(totalBalance);

      const grid = document.getElementById('accountsGrid');
      grid.innerHTML = '';

      if(accounts.length === 0) {
        grid.innerHTML = `<div style="grid-column: 1/-1; text-align:center; padding: 4rem; color: var(--text-muted);">
          <i class="fas fa-bank" style="font-size: 3rem; margin-bottom: 1rem; opacity: 0.3;"></i>
          <p>No accounts connected. Add one to see your balance.</p>
        </div>`;
        return;
      }

      accounts.forEach((acc, index) => {
        const accTxns = txns.filter(t => t.acc === acc.name);
        let currentBal = 0;
        accTxns.forEach(t => currentBal += t.amt);

        grid.innerHTML += `
          <div class="account-card">
            <div class="acc-name">${acc.name}</div>
            <div class="acc-bal">₦ ${currentBal.toLocaleString()}</div>
            <div style="display:flex; justify-content:space-between; align-items:center; margin-top:1rem;">
                <span style="font-size:0.8rem; color:var(--success); font-weight:600;">ACTIVE</span>
                <button onclick="deleteAcc(${index}, '${acc.name}')" style="background:none; border:none; color:var(--danger); cursor:pointer; font-weight:600; font-size:0.8rem;">REMOVE</button>
            </div>
          </div>
        `;
      });
    }

    function openAccModal() { document.getElementById('accModal').style.display = 'flex'; }
    function closeAccModal() { document.getElementById('accModal').style.display = 'none'; }

    function saveAccount() {
      const name = document.getElementById('accName').value.trim();
      const bal = parseFloat(document.getElementById('accInitial').value) || 0;
      
      if(!name) return alert("Please name your account!");

      const accounts = JSON.parse(localStorage.getItem('myAccounts')) || [];
      accounts.push({ name });
      localStorage.setItem('myAccounts', JSON.stringify(accounts));

      const txns = JSON.parse(localStorage.getItem('myTransactions')) || [];
      txns.push({
        date: new Date().toISOString().split('T')[0],
        desc: `Initial Balance: ${name}`,
        cat: 'Adjustment',
        amt: bal,
        type: 'income',
        acc: name
      });
      localStorage.setItem('myTransactions', JSON.stringify(txns));
      
      closeAccModal();
      renderAccounts();
    }

    function deleteAcc(index, name) {
      if(!confirm(`Delete ${name}? This will NOT delete your transaction history.`)) return;
      
      const accounts = JSON.parse(localStorage.getItem('myAccounts')) || [];
      accounts.splice(index, 1);
      localStorage.setItem('myAccounts', JSON.stringify(accounts));
      renderAccounts();
    }

    window.onload = renderAccounts;
  </script>
</body>
</html>
