<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Finance Tracker • Register</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    :root {
      --primary: #4361ee;
      --primary-dark: #3a0ca3;
      --success: #06d6a0;
      --danger: #ef476f;
      --gray: #94a3b8;
      --light: #f8fafc;
      --dark: #0f172a;
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: var(--dark);
    }

    .container {
      background: white;
      border-radius: 24px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.05);
      width: 100%;
      max-width: 420px;
      overflow: hidden;
      border: 1px solid #f1f5f9;
    }

    .header {
      background: linear-gradient(180deg, #4361ee 0%, #3a0ca3 100%);
      color: white;
      padding: 3rem 2rem;
      text-align: center;
    }

    .header h1 { font-size: 1.8rem; font-weight: 800; margin-bottom: 0.5rem; }
    .header p { opacity: 0.8; font-size: 0.9rem; font-weight: 500; }

    .form-body { padding: 2.5rem 2rem; }
    .form-group { margin-bottom: 1.5rem; position: relative; }

    label {
      display: block;
      margin-bottom: 0.6rem;
      font-weight: 600;
      font-size: 0.85rem;
      color: var(--gray);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input {
      width: 100%;
      padding: 0.85rem 1rem;
      border: 1.5px solid #f1f5f9;
      border-radius: 12px;
      font-size: 1rem;
      background: #f8fafc;
      transition: all 0.2s;
    }

    /* Space for the eye icon */
    .pass-input { padding-right: 45px; }

    input:focus {
      outline: none;
      border-color: var(--primary);
      background: white;
      box-shadow: 0 0 0 4px rgba(67, 97, 238, 0.1);
    }

    /* Eye Icon Styling */
    .toggle-password {
      position: absolute;
      right: 15px;
      top: 38px; /* Adjusted to align with input center under label */
      color: var(--gray);
      cursor: pointer;
      font-size: 1.1rem;
      transition: color 0.2s;
    }

    .toggle-password:hover { color: var(--primary); }

    .error { color: var(--danger); font-size: 0.8rem; margin-top: 0.4rem; font-weight: 500; min-height: 1.2em; }

    .btn {
      width: 100%;
      padding: 1rem;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.25s;
      box-shadow: 0 4px 12px rgba(67, 97, 238, 0.2);
    }

    .btn:hover { background: var(--primary-dark); transform: translateY(-1px); }

    /* OTP Modal Styling remains same... */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(15, 23, 42, 0.8);
      display: none; align-items: center; justify-content: center;
      z-index: 1000; backdrop-filter: blur(8px);
    }
    .modal-content {
      background: white; border-radius: 24px; width: 90%; max-width: 400px;
      padding: 2.5rem 2rem; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); text-align: center;
    }
    .otp-container { display: flex; justify-content: center; gap: 8px; margin-bottom: 2rem; }
    .otp-input {
      width: 45px; height: 55px; text-align: center; font-size: 1.5rem; font-weight: 800;
      border: 2px solid #f1f5f9; border-radius: 12px; background: #f8fafc; color: var(--primary);
    }
    .otp-error { color: var(--danger); font-size: 0.85rem; margin-top: 0.8rem; font-weight: 600; min-height: 1.2rem; }
  </style>
</head>
<body>

  <div class="container">
    <div class="header">
      <h1><i class="fas fa-bolt-lightning"></i> Finance</h1>
      <p>Secure Your Financial Future</p>
    </div>

    <div class="form-body">
      <form id="registerForm">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" placeholder="Ikeh Chukwu" required minlength="2"/>
          <div class="error" id="nameError"></div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" class="pass-input" placeholder="••••••••" required minlength="6"/>
          <i class="fas fa-eye toggle-password" id="togglePassword"></i>
          <div class="error" id="passError"></div>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <input type="password" id="confirmPassword" class="pass-input" placeholder="••••••••" required/>
          <i class="fas fa-eye toggle-password" id="toggleConfirm"></i>
          <div class="error" id="confirmError"></div>
        </div>

        <button type="submit" class="btn">Get Started</button>
      </form>

      <div class="security-note" style="text-align:center; margin-top:1.5rem; font-size:0.8rem; color:var(--gray);">
        <i class="fas fa-shield-halved" style="color:var(--success);"></i>
        AES-256 Bank-Grade Encryption
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="otpModal">
    <div class="modal-content">
      <h2>Verify Account</h2>
      <p style="color:var(--gray); margin: 1rem 0 2rem;">Enter the 6-digit code sent to your device.</p>
      <div class="otp-container">
        <input type="text" class="otp-input" maxlength="1" inputmode="numeric" required autofocus/>
        <input type="text" class="otp-input" maxlength="1" inputmode="numeric" required/>
        <input type="text" class="otp-input" maxlength="1" inputmode="numeric" required/>
        <input type="text" class="otp-input" maxlength="1" inputmode="numeric" required/>
        <input type="text" class="otp-input" maxlength="1" inputmode="numeric" required/>
        <input type="text" class="otp-input" maxlength="1" inputmode="numeric" required/>
      </div>
      <div class="otp-error" id="otpError"></div>
      <button class="btn" id="verifyBtn">Verify & Finish</button>
    </div>
  </div>

  <script>
    // PASSWORD TOGGLE LOGIC
    const setupPasswordToggle = (toggleId, inputId) => {
      const toggle = document.getElementById(toggleId);
      const input = document.getElementById(inputId);
      
      toggle.addEventListener('click', () => {
        const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
        input.setAttribute('type', type);
        toggle.classList.toggle('fa-eye');
        toggle.classList.toggle('fa-eye-slash');
      });
    };

    setupPasswordToggle('togglePassword', 'password');
    setupPasswordToggle('toggleConfirm', 'confirmPassword');

    // Registration and OTP logic from previous step...
    const registerForm = document.getElementById('registerForm');
    const otpModal = document.getElementById('otpModal');
    const otpInputs = document.querySelectorAll('.otp-input');
    let generatedOTP = "";
    let userName = "";

    registerForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const pass = document.getElementById('password').value;
      const confirmPass = document.getElementById('confirmPassword').value;

      if (pass !== confirmPass) {
        document.getElementById('confirmError').textContent = 'Passwords do not match';
        return;
      }

      generatedOTP = Math.floor(100000 + Math.random() * 900000).toString();
      userName = document.getElementById('name').value.trim();
      
      console.log(`[DEMO] OTP: ${generatedOTP}`);
      alert(`Demo Mode: Your OTP is ${generatedOTP}`);
      otpModal.style.display = 'flex';
    });

    // OTP Input logic
    otpInputs.forEach((input, idx) => {
      input.addEventListener('input', () => {
        if (input.value && idx < otpInputs.length - 1) otpInputs[idx + 1].focus();
      });
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && !input.value && idx > 0) otpInputs[idx - 1].focus();
      });
    });

    document.getElementById('verifyBtn').addEventListener('click', () => {
      let entered = '';
      otpInputs.forEach(inp => entered += inp.value);
      if (entered === generatedOTP) {
        localStorage.setItem('userName', userName);
        localStorage.setItem('isLoggedIn', 'true');
        window.location.href = 'main.html';
      } else {
        document.getElementById('otpError').textContent = 'Invalid code.';
      }
    });
  </script>
</body>
</html>
