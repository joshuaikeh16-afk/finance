<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Finance Tracker • Premium Dashboard</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    :root {
      --primary: #4361ee;
      --primary-light: #4895ef;
      --accent: #7209b7;
      --success: #06d6a0;
      --danger: #ef476f;
      --warning: #ffd166;
      --light: #f8f9fa;
      --dark: #212529;
      --sidebar-grad: linear-gradient(180deg, #4361ee 0%, #3a0ca3 100%);
      --card-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.1);
      
      /* Theme Variables */
      --bg-main: #f0f2f5;
      --bg-card: #ffffff;
      --text-color: #212529;
      --border-color: #f0f0f0;
    }

    /* Apply Theme Classes */
    body.dark-mode {
      --bg-main: #0f172a;
      --bg-card: #1e293b;
      --text-color: #f8fafc;
      --border-color: #334155;
    }

    * { margin:0; padding:0; box-sizing:border-box; transition: all 0.25s ease; }
    body { font-family: 'Segoe UI', Roboto, sans-serif; background: var(--bg-main); color: var(--text-color); min-height: 100vh; display: flex; }

    /* Sidebar - Restored to your 280px original */
    .sidebar { 
      width: 280px; 
      background: var(--sidebar-grad); 
      color: white; 
      padding: 2rem 0; 
      height: 100vh; 
      position: sticky; 
      top: 0; 
      box-shadow: 5px 0 15px rgba(0,0,0,0.1);
    }
    .logo { padding: 0 2rem 3rem; font-size: 1.8rem; font-weight: 800; display: flex; align-items: center; gap: 10px; }
    .nav-item a { display: flex; align-items: center; padding: 1rem 2rem; color: rgba(255,255,255,0.7); text-decoration: none; font-weight: 500; border-radius: 0 50px 50px 0; margin-right: 1rem; }
    .nav-item a.active { background: white; color: var(--primary); box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
    .nav-item i { font-size: 1.2rem; width: 30px; }

    /* Content Wrapper - Restored flex:1 */
    .content-wrapper { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    
    .header { 
      background: var(--bg-card); 
      backdrop-filter: blur(10px);
      padding: 1.5rem 3rem; 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      position: sticky; 
      top: 0; 
      z-index: 100;
      border-bottom: 1px solid var(--border-color);
    }

    .main-content { padding: 2.5rem 3.5rem; }

    /* Stats Grid */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 2rem; margin-bottom: 3rem; }
    .stat-card { 
      background: var(--bg-card); 
      border-radius: 24px; 
      padding: 2rem; 
      box-shadow: var(--card-shadow);
      border: 1px solid var(--border-color);
    }
    
    .stat-value { font-size: 2.2rem; font-weight: 800; margin-top: 0.5rem; }

    /* Table Container */
    .card-container { background: var(--bg-card); border-radius: 24px; padding: 2rem; box-shadow: var(--card-shadow); border: 1px solid var(--border-color); }
    
    table { width: 100%; border-collapse: separate; border-spacing: 0 10px; }
    td { padding: 1.2rem 1rem; background: var(--bg-main); border-top: 1px solid var(--border-color); border-bottom: 1px solid var(--border-color); }
    td:first-child { border-radius: 12px 0 0 12px; }
    td:last-child { border-radius: 0 12px 12px 0; }
  </style>
</head>
<body class="">

  <script>
    if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-mode');
  </script>

  <aside class="sidebar">
    <div class="logo"><i class="fas fa-bolt-lightning"></i> Finance.io</div>
    <ul class="nav-list" style="list-style:none;">
      <li class="nav-item"><a href="main.html" class="active"><i class="fas fa-grid-2"></i><span>Dashboard</span></a></li>
      <li class="nav-item"><a href="account.html"><i class="fas fa-wallet"></i><span>Accounts</span></a></li>
      <li class="nav-item"><a href="analytic.html"><i class="fas fa-chart-line"></i><span>Analytics</span></a></li>
      <li class="nav-item"><a href="trans.html"><i class="fas fa-exchange-alt"></i><span>Transactions</span></a></li>
      <li class="nav-item"><a href="category.html"><i class="fas fa-layer-group"></i><span>Categories</span></a></li>
      <li class="nav-item"><a href="setting.html"><i class="fas fa-sliders-h"></i><span>Settings</span></a></li>
    </ul>
  </aside>

  <div class="content-wrapper">
    <header class="header">
      <div class="welcome-text">
        <h1 id="welcomeMessage">Welcome back</h1>
        <p id="currentDate"></p>
      </div>
      <div style="display: flex; align-items: center; gap: 20px;">
        <select id="currencySelector" onchange="updateUI()" style="padding:10px; border-radius:10px; background:var(--bg-main); color:var(--text-color); border:1px solid var(--border-color);">
          <option value="NGN">₦ NGN</option>
          <option value="USD">$ USD</option>
          <option value="EUR">€ EUR</option>
        </select>
        <div id="userInitials" style="width:45px; height:45px; border-radius:15px; background:var(--accent); color:white; display:flex; align-items:center; justify-content:center; font-weight:800;">??</div>
      </div>
    </header>

    <main class="main-content">
      <div class="stats-grid">
        <div class="stat-card">
          <div style="color:#888; font-weight:600; font-size:0.75rem;">MAIN BALANCE</div>
          <div id="totalBalance" class="stat-value">₦ 0</div>
        </div>
        <div class="stat-card">
          <div style="color:#888; font-weight:600; font-size:0.75rem;">MONTHLY INCOME</div>
          <div id="totalIn" class="stat-value" style="color:var(--success)">₦ 0</div>
        </div>
        <div class="stat-card">
          <div style="color:#888; font-weight:600; font-size:0.75rem;">MONTHLY EXPENSES</div>
          <div id="totalOut" class="stat-value" style="color:var(--danger)">₦ 0</div>
        </div>
      </div>

      <div class="card-container">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem;">
          <h2 style="font-size:1.2rem;">Recent Activity</h2>
          <a href="trans.html" style="color:var(--primary); text-decoration:none; font-weight:600;">View All</a>
        </div>
        <table>
          <thead>
            <tr style="color:#aaa; font-size:0.8rem; text-align:left;">
              <th style="padding:10px;">DATE</th>
              <th>DESCRIPTION</th>
              <th>CATEGORY</th>
              <th>AMOUNT</th>
            </tr>
          </thead>
          <tbody id="recentTxnBody"></tbody>
        </table>
      </div>
    </main>
  </div>

  <script>
    const rates = { NGN: 1, USD: 0.00065, EUR: 0.00060 };

    function updateUI() {
      const txns = JSON.parse(localStorage.getItem('myTransactions')) || [];
      const curr = document.getElementById('currencySelector').value;
      const tbody = document.getElementById('recentTxnBody');
      const name = localStorage.getItem('userName') || 'User';
      
      document.getElementById('welcomeMessage').innerText = `Welcome back, ${name}`;
      document.getElementById('userInitials').innerText = name.charAt(0).toUpperCase();
      document.getElementById('currentDate').innerText = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });

      let income = 0, expense = 0;
      tbody.innerHTML = '';

      txns.forEach((t, i) => {
        const amt = Math.abs(t.amt);
        if (t.type === 'income') income += amt; else expense += amt;

        if (i < 5) {
          const fmt = new Intl.NumberFormat('en-US', { style: 'currency', currency: curr }).format(amt * rates[curr]);
          tbody.innerHTML += `<tr>
            <td>${t.date}</td>
            <td><strong>${t.desc}</strong></td>
            <td><span style="background:#eee; padding:5px 10px; border-radius:8px; font-size:0.75rem; color:#555;">${t.cat}</span></td>
            <td style="color:var(--${t.type === 'income' ? 'success' : 'danger'}); font-weight:700;">${t.type === 'income' ? '+' : '-'}${fmt}</td>
          </tr>`;
        }
      });

      const fmtTotal = (v) => new Intl.NumberFormat('en-US', { style: 'currency', currency: curr }).format(v * rates[curr]);
      document.getElementById('totalBalance').innerText = fmtTotal(income - expense);
      document.getElementById('totalIn').innerText = fmtTotal(income);
      document.getElementById('totalOut').innerText = fmtTotal(expense);
    }

    window.onload = updateUI;
  </script>
</body>
</html>
